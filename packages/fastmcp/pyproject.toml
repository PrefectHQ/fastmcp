[project]
name = "fastmcp"
dynamic = ["version", "dependencies", "optional-dependencies"]
description = "The fast, Pythonic way to build MCP servers and clients."
authors = [{ name = "Jeremiah Lowin" }]
requires-python = ">=3.10"
readme = "README.md"
license = "Apache-2.0"
keywords = [
    "mcp",
    "mcp server",
    "mcp client",
    "model context protocol",
    "fastmcp",
    "llm",
    "agent",
]
classifiers = [
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://gofastmcp.com"
Repository = "https://github.com/PrefectHQ/fastmcp"
Documentation = "https://gofastmcp.com"

[project.scripts]
fastmcp = "fastmcp.cli:app"

[build-system]
requires = ["hatchling", "uv-dynamic-versioning>=0.7.0"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.hatch.build.targets.wheel]
bypass-selection = true

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.metadata.hooks.custom]
path = "hatch_build.py"
dependencies = ["fastmcp-slim[full]=={{ version }}"]

[tool.hatch.metadata.hooks.custom.optional-dependencies]
anthropic = ["fastmcp-slim[full,anthropic]=={{ version }}"]
apps = ["fastmcp-slim[full,apps]=={{ version }}"]
azure = ["fastmcp-slim[full,azure]=={{ version }}"]
code-mode = ["fastmcp-slim[full,code-mode]=={{ version }}"]
gemini = ["fastmcp-slim[full,gemini]=={{ version }}"]
openai = ["fastmcp-slim[full,openai]=={{ version }}"]
tasks = ["fastmcp-slim[full,tasks]=={{ version }}"]

[tool.uv-dynamic-versioning]
vcs = "git"
style = "pep440"
bump = true
fallback-version = "0.0.0"
