name: Tests

env:
  PY_COLORS: 1

on:
  push:
    branches: ["main"]
    paths:
      - "packages/fastmcp/src/**"
      - "packages/fastmcp/tests/**"
      - "packages/fastmcp/pyproject.toml"
      - "packages/fastmcp/hatch_build.py"
      - "packages/fastmcp-client/src/**"
      - "packages/fastmcp-client/tests/**"
      - "packages/fastmcp-client/pyproject.toml"
      - "uv.lock"
      - "pyproject.toml"
      - ".github/workflows/**"

  # run on all pull requests because these checks are required and will block merges otherwise
  pull_request:

  workflow_dispatch:

permissions:
  contents: read

jobs:
  run_tests:
    name: "Tests: Python ${{ matrix.python-version }} on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10"]
        include:
          - os: ubuntu-latest
            python-version: "3.13"
      fail-fast: false
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: ./.github/actions/setup-uv
        with:
          python-version: ${{ matrix.python-version }}
          resolution: locked

      - name: Run unit tests
        uses: ./.github/actions/run-pytest

      - name: Run client process tests
        uses: ./.github/actions/run-pytest
        with:
          test-type: client_process

  run_tests_lowest_direct:
    name: "Tests with lowest-direct dependencies"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup uv (lowest-direct)
        uses: ./.github/actions/setup-uv
        with:
          resolution: lowest-direct

      - name: Run unit tests
        uses: ./.github/actions/run-pytest

      - name: Run client process tests
        uses: ./.github/actions/run-pytest
        with:
          test-type: client_process

  run_conformance_tests:
    name: "MCP conformance tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: ./.github/actions/setup-uv
        with:
          resolution: locked

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Run conformance tests
        uses: ./.github/actions/run-pytest
        with:
          test-type: conformance

  run_integration_tests:
    name: "Integration tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: ./.github/actions/setup-uv
        with:
          resolution: locked

      - name: Run integration tests
        uses: ./.github/actions/run-pytest
        with:
          test-type: integration
        env:
          FASTMCP_GITHUB_TOKEN: ${{ secrets.FASTMCP_GITHUB_TOKEN }}
          FASTMCP_TEST_AUTH_GITHUB_CLIENT_ID: ${{ secrets.FASTMCP_TEST_AUTH_GITHUB_CLIENT_ID }}
          FASTMCP_TEST_AUTH_GITHUB_CLIENT_SECRET: ${{ secrets.FASTMCP_TEST_AUTH_GITHUB_CLIENT_SECRET }}

  package_install_smoke:
    name: "Package install smoke"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: ./.github/actions/setup-uv
        with:
          resolution: locked

      - name: Build package wheels
        run: uv build --all-packages --wheel --out-dir /tmp/fastmcp-dist

      - name: Install client wheel without full FastMCP
        run: |
          uv venv /tmp/fastmcp-client-smoke
          uv pip install --python /tmp/fastmcp-client-smoke/bin/python /tmp/fastmcp-dist/fastmcp_client-*.whl
          uv pip install --python /tmp/fastmcp-client-smoke/bin/python pytest pytest-asyncio pytest-env pytest-timeout inline-snapshot
          /tmp/fastmcp-client-smoke/bin/python - <<'PY'
          import importlib.util

          assert importlib.util.find_spec("fastmcp") is None

          from fastmcp_client import Client
          from fastmcp_client.client.transports import StdioTransport, StreamableHttpTransport
          from fastmcp_client.mcp_config import MCPConfig

          assert Client("https://example.com/mcp")
          assert StreamableHttpTransport("https://example.com/mcp")
          assert StdioTransport(command="uvx", args=["demo"])
          assert MCPConfig.from_dict({"mcpServers": {"demo": {"url": "https://example.com/mcp"}}})
          PY
          (
            cd packages/fastmcp-client
            /tmp/fastmcp-client-smoke/bin/python -m pytest --import-mode=importlib tests
          )

      - name: Install full package from matching local wheels
        run: |
          uv venv /tmp/fastmcp-full-smoke
          uv pip install --python /tmp/fastmcp-full-smoke/bin/python --find-links /tmp/fastmcp-dist /tmp/fastmcp-dist/fastmcp-*.whl
          /tmp/fastmcp-full-smoke/bin/python - <<'PY'
          from fastmcp import Client as FullClient
          from fastmcp.client.client import CallToolResult
          from fastmcp.exceptions import ToolError
          from fastmcp_client import Client as SplitClient
          from fastmcp_client.client.client import CallToolResult as SplitCallToolResult
          from fastmcp_client.exceptions import ToolError as SplitToolError

          assert FullClient is SplitClient
          assert CallToolResult is SplitCallToolResult
          assert ToolError is SplitToolError
          PY
