name: Publish fastmcp-client to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  pypi-publish:
    name: Upload fastmcp-client to PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build fastmcp-client
        run: uv build --package fastmcp-client

      - name: Publish fastmcp-client to PyPI
        run: uv publish -v dist/fastmcp_client-*.tar.gz dist/fastmcp_client-*.whl
