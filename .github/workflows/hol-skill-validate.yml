name: Validate Skill
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: skill-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate skill
        uses: internet-dot/skill-publish@b81e61395f7e6c0e9cd0c8ba0d53faa9e2d22b7d # fix/add-pnpm-install
        with:
          skill-dir: .
          mode: validate
