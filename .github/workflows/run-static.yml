name: Run static analysis

env:
  PY_COLORS: 1

on:
  push:
    branches: ["main"]
    paths:
      - "packages/fastmcp/src/**"
      - "packages/fastmcp/tests/**"
      - "packages/fastmcp/pyproject.toml"
      - "packages/fastmcp/hatch_build.py"
      - "packages/fastmcp-client/src/**"
      - "packages/fastmcp-client/tests/**"
      - "packages/fastmcp-client/pyproject.toml"
      - "uv.lock"
      - "pyproject.toml"
      - ".github/workflows/**"

  # run on all pull requests because these checks are required and will block merges otherwise
  pull_request:

  workflow_dispatch:

permissions:
  contents: read

jobs:
  static_analysis:
    timeout-minutes: 2
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: ./.github/actions/setup-uv
        with:
          resolution: locked

      - name: Run prek
        uses: j178/prek-action@v2
        env:
          SKIP: no-commit-to-branch
