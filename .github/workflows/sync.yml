# Daily sync: fetch from fastmcp (upstream), merge into main, push to this repo (origin).
# Runs at 09:00 UTC daily; can also be triggered manually.

name: Sync from fastmcp

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/jlowin/fastmcp.git || true
          git fetch upstream

      - name: Merge upstream/main into main and push
        run: |
          git checkout main
          git merge upstream/main --no-edit
          git push origin main
