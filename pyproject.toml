[tool.uv]
package = false

[tool.uv.workspace]
members = ["packages/fastmcp", "packages/fastmcp-slim"]

[dependency-groups]
dev = [
    "dirty-equals>=0.9.0",
    "fastmcp[anthropic,apps,azure,code-mode,gemini,openai,tasks]",
    "fastapi>=0.115.12",
    "opentelemetry-sdk>=1.20.0",
    "inline-snapshot[dirty-equals]>=0.27.2",
    "ipython>=8.12.3",
    "pdbpp>=0.11.7",
    "psutil>=7.0.0",
    "pyinstrument>=5.0.2",
    "pyperclip>=1.9.0",
    "pytest>=8.3.3",
    "pytest-asyncio>=1.2.0",
    "pytest-cov>=6.1.1",
    "pytest-env>=1.1.5",
    "pytest-flakefinder>=1.1.0",
    "pytest-httpx>=0.35.0",
    "pytest-report>=0.2.1",
    "pytest-retry>=1.7.0",
    "pytest-timeout>=2.4.0",
    "pytest-xdist>=3.6.1",
    "ruff>=0.12.8",
    "ty>=0.0.29",
    "prek>=0.2.12",
    "loq>=0.1.0a3",
    "opentelemetry-exporter-otlp-proto-grpc>=1.39.0",
    "pytest-examples>=0.0.18",
]

[tool.uv.sources]
fastmcp = { workspace = true }
fastmcp-slim = { workspace = true }

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
filterwarnings = [
    "ignore:Using in-memory token storage:UserWarning",
    "error:coroutine .* was never awaited:RuntimeWarning",
    "error:Exception ignored in.*coroutine:pytest.PytestUnraisableExceptionWarning",
]
timeout = 5
env = [
    "FASTMCP_TEST_MODE=1",
    'D:FASTMCP_LOG_LEVEL=DEBUG',
    'D:FASTMCP_ENABLE_RICH_TRACEBACKS=0',
]
markers = [
    "integration: marks tests as integration tests (deselect with '-m \"not integration\"')",
    "client_process: marks tests that spawn client processes via stdio transport. These can create issues when run in the same CI environment as other subprocess-based tests.",
    "conformance: marks MCP conformance tests (require Node.js/npx)",
]
pythonpath = ["packages/fastmcp-slim/src"]
testpaths = ["packages/fastmcp-slim/tests", "tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = ["--inline-snapshot=disable"]

[tool.ty.src]
include = ["packages/fastmcp-slim/src", "packages/fastmcp-slim/tests", "tests"]
exclude = ["**/node_modules", "**/__pycache__", ".venv", ".git", "dist"]

[tool.ty.environment]
python-version = "3.10"

[tool.ty.rules]
division-by-zero = "warn"
possibly-missing-attribute = "warn"
possibly-missing-import = "warn"
possibly-unresolved-reference = "warn"
unsupported-dynamic-base = "warn"
unsupported-operator = "warn"
unused-ignore-comment = "warn"

[tool.ty.terminal]
error-on-warning = true

[tool.ruff.lint]
fixable = ["ALL"]
ignore = [
    "COM812",
    "PERF203",
    "PLR0913",
    "SIM102",
]
extend-select = [
    "B",
    "C4",
    "DTZ",
    "ERA",
    "FA",
    "FLY",
    "I",
    "INP",
    "ISC",
    "LOG",
    "PERF",
    "PIE",
    "PLE",
    "RSE",
    "RUF",
    "SIM",
    "SLOT",
    "T20",
    "TID",
    "UP",
]

[tool.ruff.lint.isort]
known-first-party = ["fastmcp"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "I001", "RUF013"]
"packages/fastmcp-slim/src/fastmcp/__init__.py" = ["E402"]
"packages/fastmcp-slim/src/fastmcp/cli/**.py" = ["T20"]
"packages/fastmcp-slim/src/fastmcp/client/oauth_callback.py" = ["T20"]
"packages/fastmcp-slim/src/fastmcp/contrib/**/example.py" = ["T20"]
"!packages/**/src/**.py" = [
    "B",
    "C4",
    "DTZ",
    "ERA",
    "FA",
    "FLY",
    "INP",
    "ISC",
    "LOG",
    "PERF",
    "PIE",
    "PLE",
    "RSE",
    "RUF",
    "SIM",
    "SLOT",
    "T20",
    "TID",
]

[tool.codespell]
ignore-words-list = "asend,shttp,te"
